<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Regelchat</title>
<style>
  :root{
    --bg:#f6efe4; --surface:#fbf7ef; --surface-2:#f1e7d6;
    --ink:#2b2620; --ink-soft:#6a5f50; --ink-faint:#9a8a72;
    --line:#e2d6c2; --line-strong:#d3c3a9;
    --accent:#b5552f; --accent-dark:#8f3f1e; --accent-soft:#f0e2d2;
    --serif:Georgia,'Times New Roman',serif;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  }
  html,body{height:100%;margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);}
  .app{max-width:760px;margin:0 auto;height:100%;display:flex;flex-direction:column;
    padding:0 16px env(safe-area-inset-bottom);}
  header{padding:18px 4px 10px;border-bottom:1px solid var(--line);}
  header h1{margin:0;font:600 18px var(--serif);}
  header small{color:var(--ink-faint);font-size:12px;}
  #logg{flex:1;overflow-y:auto;padding:16px 0;display:flex;flex-direction:column;gap:14px;}
  .melding{max-width:88%;padding:12px 15px;border-radius:14px;line-height:1.5;font-size:15px;
    white-space:pre-wrap;word-wrap:break-word;}
  .melding.bruker{align-self:flex-end;background:var(--accent-soft);border:1px solid var(--line-strong);}
  .melding.assistent{align-self:flex-start;background:var(--surface);border:1px solid var(--line);}
  .kilder{align-self:flex-start;display:flex;flex-wrap:wrap;gap:6px;max-width:88%;}
  .kilde{font-size:11px;font-weight:600;letter-spacing:.03em;color:var(--accent-dark);
    background:var(--surface);border:1px solid var(--line-strong);border-radius:10px;
    padding:3px 9px;cursor:default;}
  .kilde .score{color:var(--ink-faint);font-weight:400;margin-left:4px;}
  .kilde.via{opacity:.65;}
  form{display:flex;gap:8px;padding:12px 0 16px;border-top:1px solid var(--line);}
  input{flex:1;font:400 15px var(--sans);padding:12px 14px;border:1px solid var(--line-strong);
    border-radius:12px;background:var(--surface);color:var(--ink);outline:none;}
  button{padding:12px 20px;border:none;border-radius:12px;background:var(--accent-dark);
    color:#fff;font:600 15px var(--sans);cursor:pointer;}
  button:disabled{opacity:.5;cursor:default;}
  .feil{color:var(--accent-dark);font-size:13px;}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Regelchat</h1>
    <small>LLM-chat + graf-RAG · kildene under hvert svar viser hvilke regler som ble hentet</small>
  </header>
  <div id="logg"></div>
  <form id="skjema">
    <input id="felt" placeholder="F.eks. «Hva må jeg sjekke for snølast på flate tak med solceller?»" autocomplete="off">
    <button id="send" type="submit">Send</button>
  </form>
</div>

<script>
const logg = document.getElementById('logg');
const skjema = document.getElementById('skjema');
const felt = document.getElementById('felt');
const sendKnapp = document.getElementById('send');
let historikk = [];   // {rolle:'bruker'|'assistent', tekst}

function leggTil(klasse, tekst){
  const el = document.createElement('div');
  el.className = 'melding ' + klasse;
  el.textContent = tekst;
  logg.appendChild(el);
  logg.scrollTop = logg.scrollHeight;
  return el;
}

function visKilder(kilder){
  const rad = document.createElement('div');
  rad.className = 'kilder';
  for(const k of kilder){
    const chip = document.createElement('span');
    chip.className = 'kilde' + (k.via ? ' via' : '');
    chip.title = k.tittel + (k.via ? ' (hentet via grafen fra ' + k.via + ')' : ' (direkte vektortreff)');
    chip.innerHTML = `[${k.id}]<span class="score">${k.score.toFixed(2)}</span>`;
    rad.appendChild(chip);
  }
  logg.appendChild(rad);
  logg.scrollTop = logg.scrollHeight;
}

skjema.onsubmit = async (e) => {
  e.preventDefault();
  const sporsmal = felt.value.trim();
  if(!sporsmal) return;
  felt.value = '';
  sendKnapp.disabled = true;
  leggTil('bruker', sporsmal);
  const svarEl = leggTil('assistent', '…');
  let svar = '';

  try{
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({sporsmal, historikk}),
    });
    const leser = res.body.getReader();
    const dekoder = new TextDecoder();
    let buffer = '';
    while(true){
      const {done, value} = await leser.read();
      if(done) break;
      buffer += dekoder.decode(value, {stream: true});
      let skille;
      while((skille = buffer.indexOf('\n\n')) >= 0){
        const linje = buffer.slice(0, skille).trim();
        buffer = buffer.slice(skille + 2);
        if(!linje.startsWith('data: ')) continue;
        const h = JSON.parse(linje.slice(6));
        if(h.type === 'kilder'){
          logg.insertBefore(svarEl, null);           // hold svaret nederst
          visKilder(h.kilder);
          logg.appendChild(svarEl);
        }else if(h.type === 'delta'){
          svar += h.tekst;
          svarEl.textContent = svar;
          logg.scrollTop = logg.scrollHeight;
        }else if(h.type === 'feil'){
          svarEl.innerHTML = '<span class="feil">' + h.melding + '</span>';
        }
      }
    }
  }catch(err){
    svarEl.innerHTML = '<span class="feil">Mistet kontakt med serveren.</span>';
  }

  if(svar){
    historikk.push({rolle: 'bruker', tekst: sporsmal});
    historikk.push({rolle: 'assistent', tekst: svar});
  }
  sendKnapp.disabled = false;
  felt.focus();
};
felt.focus();
</script>
</body>
</html>
